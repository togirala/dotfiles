"$schema" = 'https://starship.rs/config-schema.json'

# Global palette assignment
palette = 'vantaglow'

format = """
[](vanta_black)\
$os\
$username\
[](bg:charcoal fg:vanta_black)\
$directory\
[](fg:charcoal bg:slate)\
$git_branch\
$git_status\
[](fg:slate bg:subtle)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:subtle bg:muted)\
$docker_context\
[](fg:muted bg:cyan)\
$time\
[ ](fg:cyan)\
$line_break$character"""

[palettes.vantaglow]
vanta_black = "#08080a"  # Deepest solid black
charcoal    = "#141416"  # Dark charcoal
slate       = "#202023"  # Deep slate
subtle      = "#303033"  # Subtle dark gray accent
muted       = "#78787d"  # Muted silver grey
cyan        = "#75f1fa"  # Vantaglow Neon Cyan
white       = "#ffffff"  # Crisp white text
red         = "#e35149"  # Alert/Git Dirty red
yellow      = "#f9e2af"  # Warning yellow

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
orange = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[os]
disabled = false
style = "bg:vanta_black fg:cyan"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = ""
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[username]
show_always = true
style_user = "bg:vanta_black fg:white"
style_root = "bg:vanta_black fg:red"
format = '[ $user ]($style)'

[directory]
style = "fg:white bg:charcoal"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:slate"
format = '[[ $symbol $branch ](fg:cyan bg:slate)]($style)'

[git_status]
style = "bg:slate"
format = '[[($all_status$ahead_behind )](fg:red bg:slate)]($style)'

[nodejs]
symbol = ""
style = "bg:subtle"
format = '[[ $symbol( $version) ](fg:cyan bg:subtle)]($style)'

[c]
symbol = " "
style = "bg:subtle"
format = '[[ $symbol( $version) ](fg:cyan bg:subtle)]($style)'

[rust]
symbol = ""
style = "bg:subtle"
format = '[[ $symbol( $version) ](fg:cyan bg:subtle)]($style)'

[golang]
symbol = ""
style = "bg:subtle"
format = '[[ $symbol( $version) ](fg:cyan bg:subtle)]($style)'

[php]
symbol = ""
style = "bg:subtle"
format = '[[ $symbol( $version) ](fg:cyan bg:subtle)]($style)'

[java]
symbol = " "
style = "bg:subtle"
format = '[[ $symbol( $version) ](fg:cyan bg:subtle)]($style)'

[kotlin]
symbol = ""
style = "bg:subtle"
format = '[[ $symbol( $version) ](fg:cyan bg:subtle)]($style)'

[haskell]
symbol = ""
style = "bg:subtle"
format = '[[ $symbol( $version) ](fg:cyan bg:subtle)]($style)'

[python]
symbol = ""
style = "bg:subtle"
format = '[[ $symbol( $version) ](fg:cyan bg:subtle)]($style)'

[docker_context]
symbol = ""
style = "bg:muted"
format = '[[ $symbol( $context) ](fg:vanta_black bg:muted)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:cyan"
format = '[[  $time ](fg:vanta_black bg:cyan)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[](bold fg:cyan)'
error_symbol = '[](bold fg:red)'
vimcmd_symbol = '[](bold fg:muted)'
vimcmd_replace_one_symbol = '[](bold fg:yellow)'
vimcmd_replace_symbol = '[](bold fg:yellow)'
vimcmd_visual_symbol = '[](bold fg:white)'