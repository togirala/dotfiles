# Run in Application Launcher mode by default
show=drun

# Points directly to your custom style sheet
style=~/.config/wofi/style.css

# Dismiss Wofi when clicking away (Needs the Hyprland layerrule below to work!)
close_on_focus_loss=true

# Sleek, compact dimensions matching your font sizes
width=450
height=400

# Center the window on your monitor
location=center

# Render application icons properly
allow_images=true
