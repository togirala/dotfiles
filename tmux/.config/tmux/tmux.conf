# ==============================================================================
#  TERMINAL & COLOR OVERRIDES (True Color + Undercurl Support)
# ==============================================================================
set -g default-terminal "tmux-256color"

# Force true color (Tc) support for system terminals
set -as terminal-overrides ",xterm-256color:Tc"
set -as terminal-overrides ",*:RGB" 

# Undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  
# Underscore colors
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ==============================================================================
#  KEYBINDINGS & UTILITIES
# ==============================================================================
# Change prefix from C-b to C-a
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Reload configuration file easily
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded!"

# Split windows using | and - (and preserve current working directory)
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Update default directory for new windows in active session
bind M-c attach-session -c "#{pane_current_path}"

# Enable mouse mode (clicking, resizing, scrolling)
set -g mouse on

# Vim-style pane resizing
bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5

# Toggle pane zoom (maximize pane)
bind -r m resize-pane -Z

# ==============================================================================
#  COPY MODE (Vim Style)
# ==============================================================================
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # Start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection  # Copy text with "y"

# Don't exit copy mode when dragging mouse selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# ==============================================================================
#  AMOLED/OLED TRUE BLACK THEME (Custom Nerd Font Status Bar)
# Force transparent/default background for all windows and panes
set -g window-style "bg=default"
set -g window-active-style "bg=default"
==============================================================================
# Note: 'bg=default' keeps the background transparent so your terminal's #000000 shines through.

set -g status "on"
set -g status-justify left
set -g status-style "bg=default,fg=colour15"

# Clean pane borders (Discreet inactive line, bright Cyan active border)
set -g pane-border-style "fg=colour234,bg=default"
set -g pane-active-border-style "fg=colour39,bg=default"

# Status Left: Displays the active session name with an icon
set -g status-left-length 50
set -g status-left "#[fg=colour118,bold] 󰖼 #S #[fg=colour238]│ "

# Status Right: Minimalist Date and Time
set -g status-right-length 100
set -g status-right "#[fg=colour211]󰃭 %Y-%m-%d #[fg=colour238]│ #[fg=colour39] %H:%M "

# Inactive Window Tab Style (Muted gray-blue)
set-window-option -g window-status-style "fg=colour243,bg=default"
set-window-option -g window-status-format " #I:#W "

# Active Window Tab Style (Vibrant Neon Magenta + Nerd Font indicator)
set-window-option -g window-status-current-style "fg=colour201,bg=default,bold"
set-window-option -g window-status-current-format " 󰣆 #I:#W* "

# Command Prompt / Message Styling
set -g message-style "fg=colour201,bg=default,bold"

# Selection mode highlight color (when scrolling through history)
set-window-option -g mode-style "fg=colour0,bg=colour39"

# ==============================================================================
#  TMUX PLUGIN MANAGER (TPM)
# ==============================================================================
set -g @plugin 'tmux-plugins/tpm'

# List of chosen plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # Seamless navigation between tmux and neovim
set -g @plugin 'tmux-plugins/tmux-resurrect'     # Persist tmux sessions after reboot
set -g @plugin 'tmux-plugins/tmux-continuum'     # Automatically saves sessions every 15 mins

# Environment Persistence Config
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# ------------------------------------------------------------------------------
# Disabled Themes (Kept for reference, but commented out to keep OLED background)
# ------------------------------------------------------------------------------
# set -g @plugin 'wfxr/tmux-power'
# set -g @tmux_power_theme 'colour6'

# Initialize TMUX plugin manager (Must remain at the very bottom!)
run '~/.tmux/plugins/tpm/tpm'