# Sourcing your color palette (adjust mocha.conf/vantaglow.conf here if needed)
source = ~/.config/hypr/vantaglow.conf

$accent = $highlight
$accentAlpha = $highlightAlpha
$font = JetBrainsMono Nerd Font

# GENERAL CONFIGURATION
general {
    disable_loading_bar = true
    hide_cursor = false        # Keeps your cursor visible
    grace = 5                  # 5-second grace period to unlock without password
}

# SMOOTH ANIMATIONS
animations {
    enabled = true
    bezier = easeOutQuint, 0.16, 1, 0.3, 1
    bezier = easeInQuint, 0.64, 0, 0.78, 0
    bezier = linear, 0, 0, 1, 1

    animation = fadeIn, 1, 5, easeOutQuint
    animation = fadeOut, 1, 5, easeInQuint
    animation = inputFieldDots, 1, 4, easeOutQuint
}

# BACKGROUND (Heavily dimmed and blurred desktop)
background {
    path = screenshot          # Uses active live screenshot
    blur_passes = 3            # High blur depth
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.30          # Heavily dimmed to reduce background opacity
    color = $dark9_solid       # Fallback solid color
}

# USER AVATAR (Positioned higher to allow center breathing room)
image {
    path = ~/.face
    size = 100
    border_size = 2
    border_color = $accent

    position = 0, 125          # Raised to 125 for vertical screen elegance
    halign = center
    valign = center
}

# DYNAMIC TIME-OF-DAY USER GREETING
label {
    text = cmd[update:60000] echo "Good $(date +%H | awk '{if ($1<12) print "morning"; else if ($1<18) print "afternoon"; else print "evening"}')!"
    color = $text
    font_size = 15
    font_family = $font
    position = 0, 45           # Spaced out beautifully below the avatar
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    size = 300, 60
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $accent
    inner_color = $dark9        
    font_color = $text
    fade_on_empty = false
    placeholder_text = <span foreground="##ffffffaa"><i>󰌾 Enter Password...</i></span>
    hide_input = false
    
    # Status colors
    check_color = $accent
    fail_color = $red
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = $yellow    # Turns outer border yellow when Caps Lock is active
    
    position = 0, -45          # Shifted slightly down to create a balanced gap from greeting
    halign = center
    valign = center
}

# CLOCK (Top-Right, optimized scale for vertical monitors)
label {
    text = cmd[update:30000] echo "$(date +"%R")"
    color = $text
    font_size = 80             # Adjusted from 90 to protect portrait screen layouts
    font_family = $font
    position = -50, -50        # Consistent 50px corner padding
    halign = right
    valign = top
}

# DATE (Top-Right, under clock)
label {
    text = cmd[update:43200000] echo "$(date +"%A, %d %B %Y")"
    color = $text
    font_size = 20             # Clean, slightly smaller size for readability
    font_family = $font
    position = -50, -170       # Spaced elegantly beneath the clock
    halign = right
    valign = top
}

# ROBUST BATTERY INDICATOR (Bottom-Left)
label {
    text = cmd[update:5000] BAT=$(ls /sys/class/power_supply/ | grep -E '^BAT[0-9]' | head -n 1); if [ -n "$BAT" ]; then status=$(cat /sys/class/power_supply/$BAT/status); cap=$(cat /sys/class/power_supply/$BAT/capacity); [ "$status" = "Charging" ] && echo -n "󱐋 "; echo "${cap}%"; else echo "󰚥 AC"; fi
    color = $text
    font_size = 14
    font_family = $font
    position = 50, 50          # Standardized 50px corner padding
    halign = left
    valign = bottom
}

# WEATHER WIDGET (Top-Left)
label {
    text = cmd[update:3600000] echo "$(curl -s --connect-timeout 2 'wttr.in?format=%c+%t' || echo '󰖪 Weather Offline')"
    color = $text
    font_size = 14
    font_family = $font
    position = 50, -50         # Standardized 50px corner padding
    halign = left
    valign = top
}

# HOSTNAME & UPTIME (Top-Left, adjusted to sit cleanly below weather)
label {
    text = cmd[update:60000] echo "󰍹  $HOSTNAME | 󱘖  $(uptime -p | sed 's/up //')"
    color = $text
    font_size = 11
    font_family = $font
    position = 50, -95         # Uniform 45px vertical step down
    halign = left
    valign = top
}

# ACTIVE NETWORK SSID (Bottom-Center, bottom of center stack)
label {
    text = cmd[update:10000] echo "󰖩  $(nmcli -t -f active,ssid dev wifi 2>/dev/null | grep '^yes' | cut -d: -f2 || ip route | grep default | awk '{print $5}' || echo 'Disconnected')"
    color = $text
    font_size = 11
    font_family = $font
    position = 0, 50           # Shifted to 50px from the bottom
    halign = center
    valign = bottom
}

# COMPACT SYSTEM RESOURCES (Bottom-Center, middle of center stack)
label {
    text = cmd[update:5000] echo "  $(top -bn1 | grep "Cpu(s)" | sed "s/.*, *\([0-9.]*\)%* id.*/\1/" | awk '{print 100 - $1}')%  |    $(free -m | awk '/Mem:/ {printf("%2.0f%%", $3/$2*100)}') "
    color = $text
    font_size = 11
    font_family = $font
    position = 0, 85           # Clean 35px vertical stack above network widget
    halign = center
    valign = bottom
}

# MEDIA PLAYER (Bottom-Center, top of center stack)
label {
    text = cmd[update:1000] playerctl status 2>/dev/null | grep -q "Playing" && echo "󰎆  $(playerctl metadata title) - $(playerctl metadata artist)" || echo ""
    color = $text
    font_size = 11             # Clean sizing cohesive with bottom center stack
    font_family = $font
    position = 0, 120          # Balanced spacing above resource monitor
    halign = center
    valign = bottom
}

# MULTI-LINE OPEN APPS LIST (Bottom-Right, icon-first and cleanly indented)
label {
    text = cmd[update:2000] apps=$(hyprctl clients | grep "class: " | sed 's/^.*class: //' | sort -u | sed 's/^/    /'); [ -n "$apps" ] && printf "󱡠  Active Windows\n%s" "$apps" || printf "󱡠  No active windows"
    color = $text
    font_size = 11
    font_family = $font
    position = -50, 50         # Placed cleanly in the bottom right corner
    halign = right
    valign = bottom
    align = left               # Changed to left so that the "tab" of spaces indent the list properly
}