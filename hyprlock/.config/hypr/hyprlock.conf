# Sourcing your color palette (adjust mocha.conf/vantaglow.conf here if needed)
source = ~/.config/hypr/vantaglow.conf

$accent = $highlight
$accentAlpha = $highlightAlpha
$font = JetBrainsMono Nerd Font

# GENERAL CONFIGURATION
general {
    disable_loading_bar = true
    hide_cursor = false        # Keeps your cursor visible
    grace = 5                  # 5-second grace period to unlock without password
}

# SMOOTH ANIMATIONS
animations {
    enabled = true
    bezier = easeOutQuint, 0.16, 1, 0.3, 1
    bezier = easeInQuint, 0.64, 0, 0.78, 0
    bezier = linear, 0, 0, 1, 1

    animation = fadeIn, 1, 5, easeOutQuint
    animation = fadeOut, 1, 5, easeInQuint
    animation = inputFieldDots, 1, 4, easeOutQuint
}

# BACKGROUND (Heavily dimmed and blurred desktop)
background {
    path = screenshot          # Uses active live screenshot
    blur_passes = 3            # High blur depth
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.30          # Heavily dimmed to reduce background opacity
    color = $dark9_solid       # Fallback solid color
}

# USER AVATAR (Position matched to your working original config)
image {
    path = ~/.face
    size = 100
    border_size = 2
    border_color = $accent

    position = 0, 75
    halign = center
    valign = center
}

# DYNAMIC TIME-OF-DAY USER GREETING (Fixed awk syntax error)
label {
    text = cmd[update:60000] echo "Good $(date +%H | awk '{if ($1<12) print "morning"; else if ($1<18) print "afternoon"; else print "evening"}')!"
    color = $text
    font_size = 16
    font_family = $font
    position = 0, 20           # Vertically centered perfectly between avatar and input field
    halign = center
    valign = center
}

# INPUT FIELD (Positions matched to your original config)
input-field {
    size = 300, 60
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $accent
    inner_color = $dark9        
    font_color = $text
    fade_on_empty = false
    placeholder_text = <span foreground="##ffffffaa"><i>󰌾 Enter Password...</i></span>
    hide_input = false
    
    # Status colors
    check_color = $accent
    fail_color = $red
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = $yellow    # Turns outer border yellow when Caps Lock is active
    
    position = 0, -35
    halign = center
    valign = center
}

# CLOCK (Top-Right, matched to original config)
label {
    text = cmd[update:30000] echo "$(date +"%R")"
    color = $text
    font_size = 90
    font_family = $font
    position = -30, 0
    halign = right
    valign = top
}

# DATE (Top-Right, under clock, matched to original config)
label {
    text = cmd[update:43200000] echo "$(date +"%A, %d %B %Y")"
    color = $text
    font_size = 25
    font_family = $font
    position = -30, -150
    halign = right
    valign = top
}

# ROBUST BATTERY INDICATOR (Bottom-Left)
label {
    text = cmd[update:5000] BAT=$(ls /sys/class/power_supply/ | grep -E '^BAT[0-9]' | head -n 1); if [ -n "$BAT" ]; then status=$(cat /sys/class/power_supply/$BAT/status); cap=$(cat /sys/class/power_supply/$BAT/capacity); [ "$status" = "Charging" ] && echo -n "󱐋 "; echo "${cap}%"; else echo "󰚥 AC"; fi
    color = $text
    font_size = 14
    font_family = $font
    position = 30, 30
    halign = left
    valign = bottom
}

# WEATHER WIDGET (Top-Left)
label {
    text = cmd[update:3600000] echo "$(curl -s --connect-timeout 2 'wttr.in?format=%c+%t' || echo '󰖪 Weather Offline')"
    color = $text
    font_size = 14
    font_family = $font
    position = 30, -30
    halign = left
    valign = top
}

# HOSTNAME & UPTIME (Top-Left, adjusted to sit below the weather)
label {
    text = cmd[update:60000] echo "󰍹  $HOSTNAME | 󱘖  $(uptime -p | sed 's/up //')"
    color = $text
    font_size = 11
    font_family = $font
    position = 30, -65
    halign = left
    valign = top
}

# OPEN APPS WIDGET (Top-Left, placed clean below Uptime)
label {
    text = cmd[update:2000] apps=$(hyprctl clients | grep "class: " | awk '{print $2}' | sort -u | tr '\n' ',' | sed 's/,$//' | sed 's/,/, /g'); [ -n "$apps" ] && echo "󱡠  $apps" || echo "󱡠  No active windows"
    color = $text
    font_size = 11
    font_family = $font
    position = 30, -100
    halign = left
    valign = top
}

# ACTIVE NETWORK SSID (Bottom-Center, shifted down to prevent overlap)
label {
    text = cmd[update:10000] echo "󰖩  $(nmcli -t -f active,ssid dev wifi 2>/dev/null | grep '^yes' | cut -d: -f2 || ip route | grep default | awk '{print $5}' || echo 'Disconnected')"
    color = $text
    font_size = 11
    font_family = $font
    position = 0, 30
    halign = center
    valign = bottom
}

# COMPACT SYSTEM RESOURCES (Bottom-Center, shifted up to prevent overlap)
label {
    text = cmd[update:5000] echo "  $(top -bn1 | grep "Cpu(s)" | sed "s/.*, *\([0-9.]*\)%* id.*/\1/" | awk '{print 100 - $1}')%  |    $(free -m | awk '/Mem:/ {printf("%2.0f%%", $3/$2*100)}') "
    color = $text
    font_size = 11
    font_family = $font
    position = 0, 60
    halign = center
    valign = bottom
}

# MEDIA PLAYER (Bottom-Right, fixed "Sample Text" parser error)
label {
    text = cmd[update:1000] playerctl status 2>/dev/null | grep -q "Playing" && echo "󰎆  $(playerctl metadata title) - $(playerctl metadata artist)" || echo ""
    color = $text
    font_size = 12
    font_family = $font
    position = -30, 30
    halign = right
    valign = bottom
}